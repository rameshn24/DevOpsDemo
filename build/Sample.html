<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample HTML Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f4f6f8;
        color: #333;
      }
      header {
        background: #c6d400;
        color: white;
        padding: 20px;
        border-radius: 8px;
      }
      main {
        margin-top: 20px;
      }
      button {
        background: #0078d4;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #005a9e;
      }
      .message {
        margin-top: 16px;
        padding: 12px;
        background: #e1f3ff;
        border-left: 4px solid #0078d4;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Welcome to the Sample HTML Page</h1>
      <p>This file demonstrates a simple HTML structure with styling and JavaScript.</p>
    </header>
    <main>
      <section>
        <h2>Features</h2>
        <ul>
          <li>Responsive layout11</li>
          <li>Styled header and button</li>
          <li>Interactive JavaScript message</li>
        </ul>
      </section>
      <section>
        <button id="showMessageBtn">Show Message</button>
        <div id="message" class="message" hidden>
          Hello! This is a sample interactive message from JavaScript.
        </div>
      </section>
    </main>
    <script>
      const button = document.getElementById('showMessageBtn');
      const message = document.getElementById('message');

      button.addEventListener('click', () => {
        message.hidden = !message.hidden;
      });
    </script>
  </body>
</html>
